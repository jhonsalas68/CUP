services:
  # Servicio Web para la aplicación Laravel
  - type: web
    name: cup-sistema-admisiones
    env: docker
    plan: free
    region: oregon # Región recomendada para el plan free
    numInstances: 1
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_URL
        sync: false # URL pública de Render (ej: https://cup-sistema-admisiones.onrender.com)
      - key: APP_KEY
        sync: false # Render solicitará esta clave al crear el servicio (generar con: php artisan key:generate --show)
      - key: DB_CONNECTION
        value: pgsql
      - key: DATABASE_URL
        fromDatabase:
          name: cup-db
          property: connectionString
      - key: STRIPE_KEY
        sync: false # Clave pública de Stripe (solicitada al configurar)
      - key: STRIPE_SECRET
        sync: false # Clave secreta de Stripe (solicitada al configurar)
      - key: SESSION_DRIVER
        value: database # Para asegurar persistencia de sesiones en el balanceador
      - key: CACHE_STORE
        value: database
      - key: QUEUE_CONNECTION
        value: database
      - key: MAIL_MAILER
        value: smtp
      - key: MAIL_SCHEME
        value: smtps
      - key: MAIL_HOST
        value: smtp.gmail.com
      - key: MAIL_PORT
        value: 465
      - key: MAIL_USERNAME
        sync: false # Correo de Gmail (ej: jssalasr126@ficct.uagrm.edu.bo) solicitado al crear
      - key: MAIL_PASSWORD
        sync: false # Contraseña de aplicación de Gmail solicitada al crear
      - key: MAIL_FROM_ADDRESS
        sync: false # Correo del remitente solicitado al crear
      - key: MAIL_FROM_NAME
        value: "CUP - Sistema de Admisiones"

databases:
  # Base de datos PostgreSQL Administrada por Render
  - name: cup-db
    plan: free
    region: oregon
    postgresMajorVersion: 16
